# ============================================================================
# KITTY — Minimal macOS setup
# Focus: clean UI, pane splits, simple tabs, light/dark friendly
# ============================================================================

# ----------------------------------------------------------------------------
# Shell integration
# ----------------------------------------------------------------------------
shell_integration enabled

# ----------------------------------------------------------------------------
# Performance
# ----------------------------------------------------------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ----------------------------------------------------------------------------
# Startup / window behavior
# ----------------------------------------------------------------------------
startup_mode windowed
remember_window_size yes

# A little breathing room, but still minimal
window_padding_width 6

# Slightly dim inactive panes without making them hard to read
inactive_text_alpha 0.85
dim_opacity 0.95

# ----------------------------------------------------------------------------
# Layouts
# ----------------------------------------------------------------------------
# Keep only the layouts you’re likely to actually use
enabled_layouts splits,stack,tall

# ----------------------------------------------------------------------------
# Appearance
# ----------------------------------------------------------------------------
# Keep transparency subtle — nice on macOS, but not too glassy
background_opacity 0.95
background_blur 1

# Minimal borders
draw_minimal_borders yes
window_border_width 1pt

# Optional: hide window decorations if you want a more native-clean feel
# hide_window_decorations titlebar-only

# ----------------------------------------------------------------------------
# Fonts
# ----------------------------------------------------------------------------
font_family Mononoki Nerd Font
font_size 14.0

# ----------------------------------------------------------------------------
# Tab bar
# ----------------------------------------------------------------------------
# Since you said kitty tab management isn’t your favorite, keep tabs minimal
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_separator " │ "
tab_title_template "{index}: {title}"

# Optional: hide tab bar when only one tab
tab_bar_min_tabs 2

# ----------------------------------------------------------------------------
# Cursor
# ----------------------------------------------------------------------------
cursor_shape block
cursor_blink_interval 0

# ----------------------------------------------------------------------------
# macOS-style pane splits
# ----------------------------------------------------------------------------
# Equivalent to the iTerm-ish muscle memory you miss
map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit

# Close current window/pane
map cmd+w close_window

# New tab
map cmd+t new_tab

# Close tab
map cmd+shift+w close_tab

# ----------------------------------------------------------------------------
# Navigate between panes
# ----------------------------------------------------------------------------
map cmd+alt+h neighboring_window left
map cmd+alt+j neighboring_window down
map cmd+alt+k neighboring_window up
map cmd+alt+l neighboring_window right

# ----------------------------------------------------------------------------
# Resize panes
# ----------------------------------------------------------------------------
map cmd+ctrl+h resize_window narrower 3
map cmd+ctrl+l resize_window wider 3
map cmd+ctrl+k resize_window taller 3
map cmd+ctrl+j resize_window shorter 3

# ----------------------------------------------------------------------------
# Tab navigation
# ----------------------------------------------------------------------------
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab

# Direct tab selection
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# New window in the same cwd
map cmd+n new_os_window_with_cwd

# ----------------------------------------------------------------------------
# Layout control
# ----------------------------------------------------------------------------
map cmd+shift+l next_layout

# ----------------------------------------------------------------------------
# Scrolling
# ----------------------------------------------------------------------------
scrollback_lines 50000
pixel_scroll no
momentum_scroll 0.96

# ----------------------------------------------------------------------------
# Clipboard
# ----------------------------------------------------------------------------
copy_on_select yes

# ----------------------------------------------------------------------------
# Bells / noise reduction
# ----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0

# ----------------------------------------------------------------------------
# Theme loading
# ----------------------------------------------------------------------------
# Pick ONE approach below:
#
# 1) Static theme:
# include ./theme-dark.conf
#
# 2) Or manage light/dark externally with separate theme files.
# Kitty docs show support for light mode / dark mode / auto light-dark modes
# in its configuration/documentation structure [1][2].
# ----------------------------------------------------------------------------
